<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Code Webview</title>
<link rel="stylesheet" href="/static/webview/index.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--vscode-editor-background, #1e1e1e); }
  /* VS Code theme variables (dark) */
  :root {
    --vscode-editor-background: #1e1e1e;
    --vscode-editor-foreground: #cccccc;
    --vscode-foreground: #cccccc;
    --vscode-focusBorder: #007fd4;
    --vscode-input-background: #3c3c3c;
    --vscode-input-foreground: #cccccc;
    --vscode-input-border: #3c3c3c;
    --vscode-button-background: #0e639c;
    --vscode-button-foreground: #ffffff;
    --vscode-button-hoverBackground: #1177bb;
    --vscode-list-hoverBackground: #2a2d2e;
    --vscode-list-activeSelectionBackground: #094771;
    --vscode-textLink-foreground: #3794ff;
    --vscode-progressBar-background: #0e70c0;
    --vscode-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --vscode-editor-font-family: 'SF Mono', Monaco, Consolas, 'Courier New', monospace;
    --vscode-editor-font-size: 13px;
    color-scheme: dark;
  }
</style>
<script>
// === VS Code API Shim ===
// The webview expects window.acquireVsCodeApi() to return an API object.
// We shim it to route messages to the parent ClawMux frame via postMessage.

(function() {
  let _state = {};
  try { _state = JSON.parse(localStorage.getItem('clawmux-webview-state') || '{}'); } catch(e) {}

  const vscodeApi = {
    postMessage(msg) {
      // Forward to parent ClawMux frame
      window.parent.postMessage({ type: 'webview-to-host', payload: msg }, '*');
    },
    getState() { return _state; },
    setState(s) {
      _state = s;
      try { localStorage.setItem('clawmux-webview-state', JSON.stringify(s)); } catch(e) {}
      return s;
    },
  };

  // acquireVsCodeApi can only be called once (matches real behavior)
  let _acquired = false;
  window.acquireVsCodeApi = function() {
    if (_acquired) throw new Error('acquireVsCodeApi can only be called once');
    _acquired = true;
    return vscodeApi;
  };

  // Listen for messages from parent ClawMux frame → forward to webview as VS Code events
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'host-to-webview') {
      // Re-dispatch as a native message event (what the webview expects from VS Code)
      window.dispatchEvent(new MessageEvent('message', { data: e.data.payload }));
    }
  });
})();
</script>
</head>
<body>
<script src="/static/webview/index.js"></script>
</body>
</html>
