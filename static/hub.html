<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Hub</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%233a86ff'/><path d='M32 12a6 6 0 0 1 6 6v14a6 6 0 0 1-12 0V18a6 6 0 0 1 6-6z' fill='white'/><path d='M20 30a12 12 0 0 0 24 0' stroke='white' stroke-width='3' fill='none' stroke-linecap='round'/><line x1='32' y1='42' x2='32' y2='50' stroke='white' stroke-width='3' stroke-linecap='round'/><line x1='25' y1='50' x2='39' y2='50' stroke='white' stroke-width='3' stroke-linecap='round'/></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
#header {
  padding: 0.5rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  background: #16162a;
  border-bottom: 1px solid #2a2a4a;
}
#header h1 {
  font-size: 1rem;
  font-weight: 600;
  flex: 1;
  cursor: pointer;
}
#header h1:hover { color: #3a86ff; }
#dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #e63946;
  transition: background 0.3s;
}
#dot.connected { background: #2ecc71; }
#conn-label {
  font-size: 0.75rem;
  color: #888;
}

/* Tab bar */
#tab-bar {
  display: flex;
  align-items: center;
  gap: 0;
  background: #12122a;
  border-bottom: 1px solid #2a2a4a;
  overflow-x: auto;
  min-height: 36px;
}
.tab {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.4rem 0.75rem;
  font-size: 0.8rem;
  color: #888;
  cursor: pointer;
  border-right: 1px solid #2a2a4a;
  white-space: nowrap;
  position: relative;
  user-select: none;
}
.tab:hover { background: #1e1e3a; }
.tab.active { color: #e0e0e0; background: #1a1a2e; border-bottom: 2px solid #3a86ff; }
.tab .status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #888;
}
.tab .status-dot.ready { background: #2ecc71; }
.tab .status-dot.starting { background: #f1c40f; }
.tab .status-dot.active { background: #3a86ff; }
.tab .badge {
  background: #e63946;
  color: #fff;
  font-size: 0.6rem;
  padding: 1px 4px;
  border-radius: 6px;
  display: none;
}
.tab .badge.visible { display: inline; }
.tab .close-btn {
  font-size: 0.7rem;
  color: #666;
  cursor: pointer;
  padding: 0 2px;
}
.tab .close-btn:hover { color: #e63946; }
#spawn-btn {
  padding: 0.4rem 0.75rem;
  font-size: 0.8rem;
  color: #3a86ff;
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
}
#spawn-btn:hover { color: #5a9aff; }
#spawn-btn.disabled { color: #555; cursor: wait; }

/* Chat area */
#chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.msg {
  max-width: 80%;
  padding: 0.75rem 1rem;
  border-radius: 1rem;
  line-height: 1.5;
  font-size: 0.95rem;
}
.msg.user {
  align-self: flex-end;
  background: #3a86ff;
  color: #fff;
  border-bottom-right-radius: 0.25rem;
}
.msg.assistant {
  align-self: flex-start;
  background: #2a2a4a;
  border-bottom-left-radius: 0.25rem;
}
.msg.system {
  align-self: center;
  background: none;
  color: #666;
  font-size: 0.8rem;
  padding: 0.25rem;
}

/* Voice grid (landing page) */
#voice-grid {
  flex: 1;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  padding: 2rem;
}
.voice-card {
  width: 120px;
  padding: 1.25rem 1rem;
  background: #2a2a4a;
  border: 2px solid transparent;
  border-radius: 1rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}
.voice-card:hover { background: #333360; border-color: #3a86ff; }
.voice-card.active { border-color: #2ecc71; }
.voice-card .voice-name {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
}
.voice-card .voice-status {
  font-size: 0.7rem;
  color: #888;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.35rem;
}
.voice-card .voice-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #555;
}
.voice-card.active .voice-dot { background: #2ecc71; }
.voice-card.starting .voice-dot { background: #f1c40f; }
.voice-card.thinking .voice-dot { background: #e67e22; animation: thinkingPulse 1.4s infinite ease-in-out; }
.voice-card.speaking .voice-dot { background: #3a86ff; }
.voice-card.listening .voice-dot { background: #e63946; }

/* Controls */
#controls {
  padding: 0.75rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  background: #16162a;
}
#status {
  font-size: 0.8rem;
  color: #888;
  min-height: 1.2em;
}
#mic {
  height: 48px;
  padding: 0 1.2rem;
  border-radius: 24px;
  border: none;
  background: #3a86ff;
  color: #fff;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  white-space: nowrap;
}
#mic:hover { background: #2a76ef; }
#mic.recording {
  background: #2ecc71;
}
#mic.recording:hover { background: #27ae60; }
#mic.interruptable {
  background: #e67e22;
}
#mic.interruptable:hover { background: #d35400; }
#mic.processing {
  background: #555;
  cursor: wait;
}
#mic:disabled { opacity: 0.4; cursor: not-allowed; }
#mic-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}
.btn-icon {
  height: 40px;
  width: 40px;
  border-radius: 50%;
  border: 2px solid #555;
  background: transparent;
  color: #888;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.btn-icon:hover { border-color: #888; color: #ccc; }
#mic-mute.muted { border-color: #e63946; color: #e63946; background: rgba(230,57,70,0.15); }
#mic-cancel { border-color: #e63946; color: #e63946; }
#mic-cancel:hover { background: rgba(230,57,70,0.2); color: #ff5a5a; }
#auto-toggle, #vad-toggle {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.75rem;
  color: #888;
  cursor: pointer;
  user-select: none;
}
#auto-toggle .toggle-track, #vad-toggle .toggle-track {
  width: 36px;
  height: 20px;
  border-radius: 10px;
  background: #333;
  position: relative;
  transition: background 0.2s;
}
#auto-toggle .toggle-track.on, #vad-toggle .toggle-track.on { background: #3a86ff; }
#auto-toggle .toggle-thumb, #vad-toggle .toggle-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #ccc;
  position: absolute;
  top: 2px;
  left: 2px;
  transition: left 0.2s;
}
#auto-toggle .toggle-track.on .toggle-thumb, #vad-toggle .toggle-track.on .toggle-thumb { left: 18px; }
#voice-select, #speed-select {
  background: #2a2a4a;
  color: #e0e0e0;
  border: 1px solid #444;
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 0.75rem;
  cursor: pointer;
  outline: none;
}
#voice-select:hover, #speed-select:hover { border-color: #666; }
#session-info {
  font-size: 0.7rem;
  color: #555;
  font-family: monospace;
  user-select: all;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(230,57,70,0.5); }
  50% { box-shadow: 0 0 0 12px rgba(230,57,70,0); }
}
.msg.thinking {
  align-self: flex-start;
  background: #2a2a4a;
  border-bottom-left-radius: 0.25rem;
  padding: 0.75rem 1.2rem;
  display: flex;
  gap: 0.3rem;
}
.thinking-dot {
  display: block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #999;
  animation: thinkingPulse 1.4s infinite ease-in-out;
}
.thinking-dot:nth-child(2) { animation-delay: 0.2s; }
.thinking-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes thinkingPulse {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.7); }
  40% { opacity: 1; transform: scale(1.1); }
}
#auto-interrupt-toggle {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.75rem;
  color: #888;
  cursor: pointer;
  user-select: none;
}
#auto-interrupt-toggle .toggle-track {
  width: 36px;
  height: 20px;
  border-radius: 10px;
  background: #333;
  position: relative;
  transition: background 0.2s;
}
#auto-interrupt-toggle .toggle-track.on { background: #3a86ff; }
#auto-interrupt-toggle .toggle-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #ccc;
  position: absolute;
  top: 2px;
  left: 2px;
  transition: left 0.2s;
}
#auto-interrupt-toggle .toggle-track.on .toggle-thumb { left: 18px; }
/* Debug panel */
.debug-section {
  background: #16162a;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  padding: 0.75rem;
  margin-bottom: 0.75rem;
}
.debug-title {
  font-size: 0.8rem;
  font-weight: 600;
  color: #3a86ff;
  margin-bottom: 0.4rem;
}
.debug-table {
  width: 100%;
  border-collapse: collapse;
}
.debug-table th, .debug-table td {
  text-align: left;
  padding: 0.25rem 0.5rem;
  border-bottom: 1px solid #2a2a4a;
}
.debug-table th { color: #666; font-weight: 500; font-size: 0.65rem; text-transform: uppercase; }
.debug-table td { font-size: 0.75rem; }
.debug-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 0.65rem;
  font-weight: 600;
}
.debug-badge.up { background: rgba(46,204,113,0.2); color: #2ecc71; }
.debug-badge.down { background: rgba(230,57,70,0.2); color: #e63946; }
.debug-badge.yes { background: rgba(58,134,255,0.2); color: #3a86ff; }
.debug-badge.no { background: rgba(136,136,136,0.2); color: #666; }
.debug-badge.voice { background: rgba(241,196,15,0.15); color: #f1c40f; }
.debug-badge.other { background: rgba(136,136,136,0.1); color: #555; }
.debug-kv { display: flex; gap: 0.5rem; margin: 0.15rem 0; }
.debug-kv .k { color: #666; min-width: 130px; }
.debug-kv .v { color: #e0e0e0; }
#home-tab.active { color: #e0e0e0 !important; border-bottom: 2px solid #3a86ff; }
#debug-tab.active { color: #e0e0e0 !important; border-bottom: 2px solid #3a86ff; }
</style>
</head>
<body>

<div id="header">
  <h1 onclick="showVoiceGrid()">Voice Hub</h1>
  <div id="dot"></div>
  <span id="conn-label">Disconnected</span>
</div>

<div id="tab-bar">
  <div id="home-tab" class="tab active" onclick="showVoiceGrid()" style="color:#e0e0e0; font-size:0.8rem;">Home</div>
  <div id="spawn-btn" onclick="spawnSession()">+ New Session</div>
  <div style="flex:1;"></div>
  <div id="debug-tab" class="tab" onclick="showDebugPanel()" style="border-right:none; color:#666; font-size:0.7rem;">Debug</div>
</div>

<div id="voice-grid"></div>

<div id="chat-area" style="display:none;"></div>

<div id="controls" style="display:none;">
  <div id="session-info"><span id="tmux-label"></span></div>
  <div id="status"></div>
  <div id="mic-row">
    <button id="mic-mute" class="btn-icon" title="Mute microphone" onclick="toggleMicMute()">Mic</button>
    <button id="mic" disabled>Record</button>
    <button id="mic-cancel" class="btn-icon" style="display:none;" title="Cancel recording" onclick="cancelRecording()">&#10005;</button>
    <div id="auto-toggle" onclick="toggleAutoMode()" title="Auto-record after Claude speaks">
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
      <span>Auto Record</span>
    </div>
    <div id="vad-toggle" onclick="toggleVAD()" title="Auto-detect when you stop talking">
      <div class="toggle-track on"><div class="toggle-thumb"></div></div>
      <span>Auto End</span>
    </div>
    <div id="auto-interrupt-toggle" onclick="toggleAutoInterrupt()" title="Interrupt Claude by speaking">
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
      <span>Auto Interrupt</span>
    </div>
    <select id="voice-select" onchange="changeVoice(this.value)" title="Session voice">
      <option value="af_sky">Sky (F)</option>
      <option value="af_alloy">Alloy (F)</option>
      <option value="af_sarah">Sarah (F)</option>
      <option value="am_adam">Adam (M)</option>
      <option value="am_echo">Echo (M)</option>
      <option value="am_onyx">Onyx (M)</option>
      <option value="bm_fable">Fable</option>
    </select>
    <select id="speed-select" onchange="changeSpeed(this.value)" title="Speech speed">
      <option value="0.75">0.75x</option>
      <option value="1.0" selected>1x</option>
      <option value="1.25">1.25x</option>
      <option value="1.5">1.5x</option>
      <option value="2.0">2x</option>
    </select>
  </div>
</div>

<div id="debug-panel" style="display:none; flex:1; overflow-y:auto; padding:1rem; font-family:'SF Mono','Menlo','Monaco','Consolas',monospace; font-size:0.8rem;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem;">
    <span style="font-size:0.95rem; font-weight:600;">Debug</span>
    <span id="debug-refresh-info" style="color:#555; font-size:0.65rem;"></span>
  </div>

  <div class="debug-section">
    <div class="debug-title">Hub</div>
    <div id="debug-hub"></div>
  </div>

  <div class="debug-section">
    <div class="debug-title">Services</div>
    <table class="debug-table" id="debug-services">
      <thead><tr><th>Service</th><th>URL</th><th>Status</th><th>Detail</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="debug-section">
    <div class="debug-title">Hub Sessions</div>
    <table class="debug-table" id="debug-sessions">
      <thead><tr><th>ID</th><th>Voice</th><th>Status</th><th>MCP</th><th>Idle</th><th>Age</th><th>Work Dir</th></tr></thead>
      <tbody></tbody>
    </table>
    <div id="debug-no-sessions" style="color:#555; padding:0.35rem; display:none;">No active sessions</div>
  </div>

  <div class="debug-section">
    <div class="debug-title">tmux Sessions</div>
    <table class="debug-table" id="debug-tmux">
      <thead><tr><th>Name</th><th>Type</th><th>Windows</th><th>Attached</th><th>Created</th></tr></thead>
      <tbody></tbody>
    </table>
    <div id="debug-no-tmux" style="color:#555; padding:0.35rem; display:none;">No tmux sessions</div>
  </div>

  <div class="debug-section">
    <div class="debug-title">Hub Log (last 50 lines)</div>
    <div id="debug-log" style="background:#0d0d1a; border:1px solid #2a2a4a; border-radius:6px; padding:0.5rem; max-height:300px; overflow-y:auto; white-space:pre-wrap; word-break:break-all; font-size:0.7rem; color:#aaa; line-height:1.5;">Loading...</div>
  </div>
</div>

<script>
// --- State ---
const sessions = new Map(); // session_id -> { label, status, messages[], el }
let activeSessionId = null;
let recordingSessionId = null;
let ws = null;
let mediaRecorder = null;
let audioChunks = [];
let recording = false;
let micMuted = false;
let autoMode = false;
let pendingListenSessionId = null; // session waiting for manual mic click
let vadEnabled = true;
let vadInterval = null; // silence detection interval
let vadDetectedSpeech = false; // did we hear any speech this recording?
let currentAudio = null; // { audio, sessionId, url } — currently playing audio element
let currentBufferedPlayer = null; // { sessionId, stop() } — active buffered playback
let persistentStream = null; // persistent mic MediaStream, acquired once
let autoInterruptEnabled = false; // voice-based interrupt during playback
let playbackVadInterval = null; // VAD interval during playback for auto-interrupt
let playbackVadCtx = null; // AudioContext for playback VAD
const spawningVoices = new Set(); // voice IDs currently being spawned

// --- DOM refs ---
const tabBar = document.getElementById('tab-bar');
const spawnBtn = document.getElementById('spawn-btn');
const chatArea = document.getElementById('chat-area');
const controls = document.getElementById('controls');
const statusEl = document.getElementById('status');
const micBtn = document.getElementById('mic');
const micCancelBtn = document.getElementById('mic-cancel');
const dot = document.getElementById('dot');
const connLabel = document.getElementById('conn-label');

// --- Audio cues ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, duration, startDelay = 0, gain = 0.15) {
  const osc = audioCtx.createOscillator();
  const vol = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  vol.gain.value = gain;
  // Fade out
  vol.gain.setValueAtTime(gain, audioCtx.currentTime + startDelay);
  vol.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + startDelay + duration);
  osc.connect(vol);
  vol.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime + startDelay);
  osc.stop(audioCtx.currentTime + startDelay + duration);
}

function cueListening() {
  // Ascending two-tone: your turn to speak
  playTone(660, 0.12, 0);
  playTone(880, 0.15, 0.1);
}

function cueProcessing() {
  // Single soft low tone: thinking
  playTone(440, 0.2, 0, 0.08);
}

function cueSessionReady() {
  // Three-note chime: connected
  playTone(523, 0.1, 0);
  playTone(659, 0.1, 0.1);
  playTone(784, 0.15, 0.2);
}

// --- Voice display names ---
const VOICE_NAMES = {
  af_sky: 'Sky', af_alloy: 'Alloy', af_sarah: 'Sarah',
  am_adam: 'Adam', am_echo: 'Echo', am_onyx: 'Onyx',
  bm_fable: 'Fable',
};
function voiceDisplayName(v) { return VOICE_NAMES[v] || v; }

// --- localStorage persistence ---
const STORAGE_KEY = 'voice-hub-chats';
function saveChats() {
  const data = {};
  for (const [id, s] of sessions) {
    data[id] = { messages: s.messages, voice: s.voice, label: s.label, tmux_session: s.tmux_session };
  }
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}
function loadChats() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}
function clearChat(sessionId) {
  const saved = loadChats();
  delete saved[sessionId];
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(saved)); } catch {}
}

// --- Helpers ---
function setConnected(connected) {
  dot.classList.toggle('connected', connected);
  connLabel.textContent = connected ? 'Connected' : 'Disconnected';
}

function setStatus(text) {
  statusEl.textContent = text;
}

function updateLayout() {
  if (debugActive) return; // debug panel handles its own layout
  const inChat = activeSessionId && sessions.has(activeSessionId);
  document.getElementById('voice-grid').style.display = inChat ? 'none' : 'flex';
  chatArea.style.display = inChat ? 'flex' : 'none';
  controls.style.display = inChat ? 'flex' : 'none';
  document.getElementById('debug-panel').style.display = 'none';
  if (!inChat) renderVoiceGrid();
}

// --- Voice grid (landing page) ---
function showVoiceGrid() {
  activeSessionId = null;
  hideDebugPanel();
  tabBar.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('home-tab').classList.add('active');
  updateLayout();
}

function renderVoiceGrid() {
  const grid = document.getElementById('voice-grid');
  grid.innerHTML = '';
  const allVoices = Object.entries(VOICE_NAMES); // [[id, name], ...]

  for (const [voiceId, name] of allVoices) {
    // Check if this voice has an active session
    let sessionForVoice = null;
    for (const [sid, s] of sessions) {
      if (s.voice === voiceId) { sessionForVoice = s; break; }
    }

    const isSpawning = spawningVoices.has(voiceId);
    const card = document.createElement('div');
    card.className = 'voice-card';
    if (isSpawning) {
      card.classList.add('starting');
    } else if (sessionForVoice) {
      if (sessionForVoice.status === 'starting') {
        card.classList.add('starting');
      } else if (sessionForVoice.isThinking) {
        card.classList.add('thinking');
      } else if (sessionForVoice.statusText === 'Playing...' || sessionForVoice.statusText === 'Speaking...') {
        card.classList.add('speaking');
      } else if (sessionForVoice.statusText === 'Recording...' || sessionForVoice.statusText === 'Tap Record' || sessionForVoice.pendingListen) {
        card.classList.add('listening');
      } else {
        card.classList.add('active');
      }
    }

    const vname = document.createElement('div');
    vname.className = 'voice-name';
    vname.textContent = name;

    const vstatus = document.createElement('div');
    vstatus.className = 'voice-status';
    const vdot = document.createElement('span');
    vdot.className = 'voice-dot';
    const vlabel = document.createElement('span');
    if (isSpawning) {
      vlabel.textContent = 'Spawning...';
    } else if (!sessionForVoice) {
      vlabel.textContent = 'Available';
    } else if (sessionForVoice.status === 'starting') {
      vlabel.textContent = 'Starting...';
    } else if (sessionForVoice.isThinking) {
      vlabel.textContent = 'Thinking...';
    } else if (sessionForVoice.statusText === 'Playing...' || sessionForVoice.statusText === 'Speaking...') {
      vlabel.textContent = 'Speaking...';
    } else if (sessionForVoice.statusText === 'Recording...' || sessionForVoice.statusText === 'Tap Record') {
      vlabel.textContent = 'Listening...';
    } else if (sessionForVoice.pendingListen) {
      vlabel.textContent = 'Waiting...';
    } else {
      vlabel.textContent = 'Ready';
    }
    vstatus.appendChild(vdot);
    vstatus.appendChild(vlabel);

    card.appendChild(vname);
    card.appendChild(vstatus);

    card.onclick = () => {
      if (isSpawning) return;
      if (sessionForVoice) {
        switchTab(sessionForVoice.session_id);
      } else {
        spawnSession(voiceId);
      }
    };

    grid.appendChild(card);
  }
}

function renderVoiceGridIfActive() {
  if (!activeSessionId && !debugActive) renderVoiceGrid();
}

// --- Tab management ---
function createTab(session) {
  const tab = document.createElement('div');
  tab.className = 'tab';
  tab.dataset.sessionId = session.session_id;

  const statusDot = document.createElement('span');
  statusDot.className = `status-dot ${session.status}`;

  const label = document.createElement('span');
  label.className = 'tab-label';
  label.textContent = voiceDisplayName(session.voice || 'af_sky');

  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = '!';

  const closeBtn = document.createElement('span');
  closeBtn.className = 'close-btn';
  closeBtn.textContent = '\u00d7';
  closeBtn.onclick = (e) => { e.stopPropagation(); terminateSession(session.session_id); };

  tab.appendChild(statusDot);
  tab.appendChild(label);
  tab.appendChild(badge);
  tab.appendChild(closeBtn);
  tab.onclick = () => switchTab(session.session_id);

  tabBar.insertBefore(tab, spawnBtn);
  return { tab, statusDot, badge };
}

function stopActiveAudio() {
  // Pause currently playing audio and save it on the session for resume
  if (currentAudio) {
    const s = sessions.get(currentAudio.sessionId);
    currentAudio.audio.pause();
    currentAudio.audio.onended = null;
    currentAudio.audio.onerror = null;
    if (s) s.pausedAudio = currentAudio; // save for resume
    currentAudio = null;
  }
  // Stop buffered playback chain — remaining chunks stay in buffer
  if (currentBufferedPlayer) {
    currentBufferedPlayer.stop();
    currentBufferedPlayer = null;
  }
  updateMicUI();
}

function switchTab(sessionId) {
  hideDebugPanel();
  // Stop audio and recording from the tab we're leaving
  if (activeSessionId && activeSessionId !== sessionId) {
    stopActiveAudio();
    stopThinkingSound();
    if (recording) stopRecording(true); // discard — don't send to old session
    pendingListenSessionId = null;
  }
  activeSessionId = sessionId;

  // Update tab active state
  tabBar.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.sessionId === sessionId);
  });

  // Clear badge on the active tab
  const s = sessions.get(sessionId);
  if (s && s.el) {
    s.el.badge.classList.remove('visible');
  }

  // Render chat messages
  renderChat();
  updateLayout();

  if (s) {
    setStatus(s.statusText || 'Ready');
    micBtn.disabled = s.status !== 'ready' && s.status !== 'active';
    voiceSelect.value = s.voice || 'af_sky';
    speedSelect.value = String(parseFloat(s.speed || 1.0).toFixed(1));
    document.getElementById('tmux-label').textContent = s.tmux_session || s.session_id;

    // Resume thinking sound if this session is thinking
    if (s.isThinking) startThinkingSound(sessionId);

    // Resume paused audio or play buffered audio
    if (s.pausedAudio) {
      setStatus('Playing...');
      const pa = s.pausedAudio;
      s.pausedAudio = null;
      currentAudio = pa;
      updateMicUI();

      const sendDone = () => {
        URL.revokeObjectURL(pa.url);
        if (currentAudio && currentAudio.audio === pa.audio) currentAudio = null;
        updateMicUI();
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ session_id: sessionId, type: 'playback_done' }));
        }
      };
      pa.audio.onended = sendDone;
      pa.audio.onerror = sendDone;
      pa.audio.play().catch(sendDone);
    } else if (s.audioBuffer && s.audioBuffer.length > 0) {
      setStatus('Playing buffered audio...');
      playBufferedAudio(sessionId, s.audioBuffer);
      s.audioBuffer = [];
    } else if (s.pendingListen) {
      // Session was waiting for mic input
      s.pendingListen = false;
      if (micMuted) {
        sendSilentAudio(sessionId);
      } else if (autoMode) {
        cueListening();
        startRecording(sessionId);
      } else {
        cueListening();
        pendingListenSessionId = sessionId;
        updateMicUI();
        setStatus('Tap Record');
      }
    }
  }
}

function renderChat() {
  chatArea.innerHTML = '';
  const s = sessions.get(activeSessionId);
  if (!s) return;
  for (const msg of s.messages) {
    const div = document.createElement('div');
    div.className = `msg ${msg.role}`;
    div.textContent = msg.text;
    chatArea.appendChild(div);
  }
  // Re-show thinking indicator if session is thinking
  if (s.isThinking) {
    const div = document.createElement('div');
    div.className = 'msg thinking';
    div.id = `thinking-${activeSessionId}`;
    for (let i = 0; i < 3; i++) {
      const dot = document.createElement('span');
      dot.className = 'thinking-dot';
      div.appendChild(dot);
    }
    chatArea.appendChild(div);
  }
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addMessage(sessionId, role, text) {
  const s = sessions.get(sessionId);
  if (!s) return;
  s.messages.push({ role, text });
  saveChats();
  if (sessionId === activeSessionId) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }
}

// --- Session management ---
async function spawnSession(voiceId = '') {
  if (spawnBtn.classList.contains('disabled')) return;
  if (voiceId && spawningVoices.has(voiceId)) return; // already spawning this voice
  spawnBtn.classList.add('disabled');
  spawnBtn.textContent = 'Spawning...';

  // Mark voice as spawning immediately and update grid
  if (voiceId) {
    spawningVoices.add(voiceId);
    renderVoiceGridIfActive();
  }

  // Acquire mic permission now while page is focused (avoids background focus issues)
  try { await getMicStream(); } catch (e) { console.warn('Mic permission denied:', e); }

  try {
    const resp = await fetch('/api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ voice: voiceId }),
    });
    const data = await resp.json();
    if (data.error) {
      alert('Failed to spawn: ' + data.error);
      return;
    }
    // Session will appear via WS session_spawned or session_status message
    // But also add it immediately from the REST response
    if (!sessions.has(data.session_id)) {
      addSession(data);
    }
  } catch (e) {
    alert('Spawn error: ' + e.message);
  } finally {
    if (voiceId) spawningVoices.delete(voiceId);
    spawnBtn.classList.remove('disabled');
    spawnBtn.textContent = '+ New Session';
    renderVoiceGridIfActive();
  }
}

function addSession(data) {
  const el = createTab(data);
  const isReady = data.status === 'ready' || data.mcp_connected;
  const saved = loadChats()[data.session_id];
  sessions.set(data.session_id, {
    ...data,
    tmux_session: data.tmux_session || data.session_id,
    voice: data.voice || (saved && saved.voice) || 'af_sky',
    speed: data.speed || (saved && saved.speed) || 1.0,
    messages: (saved && saved.messages) || [],
    statusText: isReady ? 'Ready' : 'Waiting for Claude...',
    el,
  });
  switchTab(data.session_id);
  // Only add system message if no saved history
  if (!saved || saved.messages.length === 0) {
    if (isReady) {
      addMessage(data.session_id, 'system', 'Claude connected.');
    } else {
      addMessage(data.session_id, 'system', 'Session started. Waiting for Claude to connect...');
    }
  }
}

async function terminateSession(sessionId) {
  try {
    await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' });
  } catch (e) {
    console.error('Terminate error:', e);
  }
  removeSession(sessionId);
}

function removeSession(sessionId) {
  const s = sessions.get(sessionId);
  if (s && s.el) {
    s.el.tab.remove();
  }
  sessions.delete(sessionId);
  clearChat(sessionId);

  if (activeSessionId === sessionId) {
    // Switch to another tab or show empty state
    const remaining = Array.from(sessions.keys());
    if (remaining.length > 0) {
      switchTab(remaining[0]);
    } else {
      activeSessionId = null;
    }
  }
  updateLayout();
}

// --- VAD (voice activity detection) ---
function toggleVAD() {
  vadEnabled = !vadEnabled;
  const track = document.querySelector('#vad-toggle .toggle-track');
  track.classList.toggle('on', vadEnabled);
}

function startVAD(stream) {
  if (vadInterval) { clearInterval(vadInterval); vadInterval = null; }
  vadDetectedSpeech = false;

  const vadCtx = new AudioContext();
  const source = vadCtx.createMediaStreamSource(stream);
  const analyser = vadCtx.createAnalyser();
  analyser.fftSize = 512;
  source.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);
  const SILENCE_THRESHOLD = 10; // RMS level below which = silence
  const SILENCE_DURATION = 3000; // ms of silence before auto-stop
  let silenceStart = null;

  vadInterval = setInterval(() => {
    if (!recording) {
      clearInterval(vadInterval);
      vadInterval = null;
      vadCtx.close();
      return;
    }

    analyser.getByteTimeDomainData(data);
    // Calculate RMS
    let sum = 0;
    for (let i = 0; i < data.length; i++) {
      const v = (data[i] - 128) / 128;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / data.length) * 200;

    if (rms < SILENCE_THRESHOLD) {
      if (!silenceStart) silenceStart = Date.now();
      else if (vadDetectedSpeech && Date.now() - silenceStart > SILENCE_DURATION) {
        // Speech was heard, now silence — auto-stop
        stopRecording();
        clearInterval(vadInterval);
        vadInterval = null;
        vadCtx.close();
      }
    } else {
      silenceStart = null;
      vadDetectedSpeech = true;
    }
  }, 100);
}

// --- Auto Interrupt (voice-based interrupt during playback) ---
function toggleAutoInterrupt() {
  autoInterruptEnabled = !autoInterruptEnabled;
  const track = document.querySelector('#auto-interrupt-toggle .toggle-track');
  track.classList.toggle('on', autoInterruptEnabled);
}

function startPlaybackVAD(sessionId) {
  stopPlaybackVAD();
  getMicStream().then(stream => {
    playbackVadCtx = new AudioContext();
    const source = playbackVadCtx.createMediaStreamSource(stream);
    const analyser = playbackVadCtx.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);

    const data = new Uint8Array(analyser.frequencyBinCount);
    const SPEECH_THRESHOLD = 25; // higher than auto-end to avoid speaker bleed
    const SPEECH_DURATION = 300; // ms of sustained speech before triggering
    let speechStart = null;

    playbackVadInterval = setInterval(() => {
      // Stop if no longer playing
      if (!currentAudio && !currentBufferedPlayer) {
        stopPlaybackVAD();
        return;
      }

      analyser.getByteTimeDomainData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) {
        const v = (data[i] - 128) / 128;
        sum += v * v;
      }
      const rms = Math.sqrt(sum / data.length) * 200;

      if (rms >= SPEECH_THRESHOLD) {
        if (!speechStart) speechStart = Date.now();
        else if (Date.now() - speechStart >= SPEECH_DURATION) {
          // Sustained speech detected — interrupt and record
          const sid = sessionId;
          stopPlaybackVAD();
          interruptPlayback(sid);
          startRecording(sid);
        }
      } else {
        speechStart = null;
      }
    }, 50); // check every 50ms for responsiveness
  }).catch(err => {
    console.warn('Playback VAD mic error:', err);
  });
}

function stopPlaybackVAD() {
  if (playbackVadInterval) {
    clearInterval(playbackVadInterval);
    playbackVadInterval = null;
  }
  if (playbackVadCtx) {
    playbackVadCtx.close().catch(() => {});
    playbackVadCtx = null;
  }
}

// --- Thinking indicator ---

function hideThinking(sessionId) {

// --- Thinking sound ---
let thinkingSoundTimer = null;
let thinkingSoundSessionId = null;

function startThinkingSound(sessionId) {
  stopThinkingSound();
  thinkingSoundSessionId = sessionId;
  if (sessionId !== activeSessionId) return; // only play for focused tab
  const tick = () => {
    // Double-tick pattern: two quick soft clicks
    playTone(1200, 0.03, 0, 0.06);
    playTone(900, 0.03, 0.08, 0.04);
  };
  tick();
  thinkingSoundTimer = setInterval(tick, 800);
}

function stopThinkingSound() {
  if (thinkingSoundTimer) {
    clearInterval(thinkingSoundTimer);
    thinkingSoundTimer = null;
  }
  thinkingSoundSessionId = null;
}

// --- WebSocket ---
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    setConnected(true);
    if (!activeSessionId) setStatus('Connected');
  };

  ws.onclose = () => {
    setConnected(false);
    ws = null;
    setTimeout(connect, 2000);
  };

  ws.onerror = () => { ws?.close(); };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    handleMessage(data);
  };
}

function handleMessage(data) {
  const { type, session_id } = data;

  // Hub-level messages (no session_id)
  if (type === 'session_list') {
    for (const s of data.sessions) {
      if (!sessions.has(s.session_id)) addSession(s);
    }
    return;
  }
  if (type === 'session_spawned') {
    if (!sessions.has(data.session.session_id)) addSession(data.session);
    return;
  }
  if (type === 'session_terminated') {
    removeSession(data.session_id);
    return;
  }
  if (type === 'session_status') {
    const s = sessions.get(data.session_id);
    if (s) {
      s.status = data.status;
      if (s.el) s.el.statusDot.className = `status-dot ${data.status}`;
      if (data.status === 'ready') {
        cueSessionReady();
        addMessage(data.session_id, 'system', 'Claude connected.');
      }
    }
    return;
  }
  if (type === 'error') {
    alert('Hub error: ' + data.message);
    return;
  }

  // Session-scoped messages
  if (!session_id) return;
  const s = sessions.get(session_id);
  if (!s) return;

  if (type === 'assistant_text') {
    hideThinking(session_id);
    stopThinkingSound();
    addMessage(session_id, 'assistant', data.text);
    renderVoiceGridIfActive();
  } else if (type === 'user_text') {
    addMessage(session_id, 'user', data.text);
    showThinking(session_id);
    startThinkingSound(session_id);
    renderVoiceGridIfActive();
  } else if (type === 'audio') {
    s.status = 'active';
    if (s.el) s.el.statusDot.className = 'status-dot active';
    if (session_id === activeSessionId) {
      playAudio(session_id, data.data);
      setStatus('Playing...');
    } else {
      // Buffer audio for background session — don't play or ack
      if (!s.audioBuffer) s.audioBuffer = [];
      s.audioBuffer.push(data.data);
      if (s.el) s.el.badge.classList.add('visible');
    }
  } else if (type === 'listening') {
    if (recording && recordingSessionId === session_id) {
      // Already recording for this session (e.g. voice interrupt started it)
      // Just ignore the listening message
    } else if (micMuted) {
      // Mic muted: send empty audio so hub doesn't hang
      sendSilentAudio(session_id);
    } else if (session_id === activeSessionId && autoMode) {
      cueListening();
      startRecording(session_id);
    } else if (session_id === activeSessionId && !autoMode) {
      // Manual mode: show Record button and wait for user to click
      cueListening();
      pendingListenSessionId = session_id;
      updateMicUI();
      setStatus('Tap Record');
    } else {
      // Background tab — mark pending, show badge
      s.pendingListen = true;
      if (s.el) s.el.badge.classList.add('visible');
    }
    renderVoiceGridIfActive();
  } else if (type === 'status') {
    s.statusText = data.text;
    if (session_id === activeSessionId) setStatus(data.text);
    renderVoiceGridIfActive();
  } else if (type === 'done') {
    s.statusText = 'Ready';
    s.status = 'ready';
    if (s.el) s.el.statusDot.className = 'status-dot ready';
    if (session_id === activeSessionId) {
      setStatus('Ready');
      micBtn.disabled = false;
      updateMicUI();
    }
    renderVoiceGridIfActive();
  } else if (type === 'session_ended') {
    // Agent said goodbye — auto-close after a short delay
    addMessage(session_id, 'system', 'Session ended.');
    setTimeout(() => terminateSession(session_id), 3000);
  }
}

// --- Audio playback ---
function playAudio(sessionId, b64data) {
  const bytes = Uint8Array.from(atob(b64data), c => c.charCodeAt(0));
  const blob = new Blob([bytes], { type: 'audio/mpeg' });
  const url = URL.createObjectURL(blob);
  const audio = new Audio(url);

  currentAudio = { audio, sessionId, url };
  if (sessionId === activeSessionId) updateMicUI();

  const cleanup = () => {
    URL.revokeObjectURL(url);
    if (currentAudio && currentAudio.audio === audio) currentAudio = null;
    updateMicUI();
  };

  const sendDone = () => {
    cleanup();
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ session_id: sessionId, type: 'playback_done' }));
    }
  };

  audio.onended = () => { stopPlaybackVAD(); sendDone(); };
  audio.onerror = () => { stopPlaybackVAD(); sendDone(); setStatus('Audio error'); };
  audio.play().then(() => {
    if (autoInterruptEnabled && !micMuted) startPlaybackVAD(sessionId);
  }).catch(() => { stopPlaybackVAD(); sendDone(); setStatus('Audio blocked — tap page first'); });
}

// --- Buffered playback ---
function playBufferedAudio(sessionId, chunks) {
  if (chunks.length === 0) return;
  let i = 0;
  let stopped = false;

  currentBufferedPlayer = {
    sessionId,
    stop() { stopped = true; stopPlaybackVAD(); if (currentAudio) { currentAudio.audio.pause(); } },
  };
  updateMicUI();
  if (autoInterruptEnabled && !micMuted) startPlaybackVAD(sessionId);

  function playNext() {
    if (stopped || i >= chunks.length) {
      currentBufferedPlayer = null;
      updateMicUI();
      if (!stopped && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ session_id: sessionId, type: 'playback_done' }));
      }
      return;
    }
    const b64data = chunks[i++];
    const bytes = Uint8Array.from(atob(b64data), c => c.charCodeAt(0));
    const blob = new Blob([bytes], { type: 'audio/mpeg' });
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = { audio, sessionId, url };
    audio.onended = () => { URL.revokeObjectURL(url); currentAudio = null; playNext(); };
    audio.onerror = () => { URL.revokeObjectURL(url); currentAudio = null; playNext(); };
    audio.play().catch(() => { currentAudio = null; playNext(); });
  }

  playNext();
}

// --- Mic UI state management ---
function updateMicUI() {
  const isPlaying = !!(currentAudio || currentBufferedPlayer);

  micBtn.classList.remove('recording', 'interruptable', 'processing');

  if (isPlaying) {
    // During playback: show interrupt button
    micBtn.style.display = 'flex';
    micBtn.disabled = false;
    micBtn.classList.add('interruptable');
    micBtn.textContent = 'Interrupt';
    micCancelBtn.style.display = 'none';
  } else if (recording) {
    // Recording: show Send + Cancel
    micBtn.style.display = 'flex';
    micBtn.classList.add('recording');
    micBtn.textContent = 'Send';
    micBtn.disabled = false;
    micCancelBtn.style.display = 'flex';
  } else {
    // Idle: always show Record button so user can initiate
    micCancelBtn.style.display = 'none';
    micBtn.style.display = 'flex';
    micBtn.textContent = 'Record';
    micBtn.disabled = false;
  }
}

// --- Persistent mic stream ---
async function getMicStream() {
  if (persistentStream) {
    // Check if tracks are still alive
    const tracks = persistentStream.getAudioTracks();
    if (tracks.length > 0 && tracks[0].readyState === 'live') {
      return persistentStream;
    }
  }
  persistentStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  // Apply current mute state
  persistentStream.getAudioTracks().forEach(t => { t.enabled = !micMuted; });
  return persistentStream;
}

// --- Recording ---
async function startRecording(sessionId) {
  recordingSessionId = sessionId;
  try {
    const stream = await getMicStream();
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    audioChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      // Don't stop persistent stream tracks — keep them alive
      if (discardRecording) {
        discardRecording = false;
      } else {
        sendAudio(sessionId);
      }
    };
    mediaRecorder.start();
    recording = true;
    updateMicUI();
    if (vadEnabled) {
      setStatus('Recording...');
    } else {
      setStatus('Recording...');
    }
    if (vadEnabled) startVAD(stream);
  } catch (err) {
    setStatus('Microphone access denied');
  }
}

let discardRecording = false;

function stopRecording(discard = false) {
  discardRecording = discard;
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
  recording = false;
  updateMicUI();
}

function cancelRecording() {
  if (recording) {
    stopRecording(true); // discard audio
    if (recordingSessionId) sendSilentAudio(recordingSessionId);
    setStatus('Recording cancelled');
  }
}

function sendAudio(sessionId) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    setStatus('Not connected');
    return;
  }
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  cueProcessing();
  setStatus('Processing...');
  micBtn.classList.add('processing');
  micBtn.textContent = 'Processing...';
  micBtn.disabled = true;

  const reader = new FileReader();
  reader.onload = () => {
    const b64 = reader.result.split(',')[1];
    ws.send(JSON.stringify({ session_id: sessionId, type: 'audio', data: b64 }));
  };
  reader.onerror = () => {
    setStatus('Error reading audio');
    updateMicUI();
  };
  reader.readAsDataURL(blob);
}

// --- Silent audio for muted sessions ---
function sendSilentAudio(sessionId) {
  // Send a minimal valid webm audio blob (silence)
  // The hub will STT it and get [BLANK_AUDIO], triggering the retry prompt
  // To avoid that, we send an empty data payload — hub should treat empty audio as "skip"
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ session_id: sessionId, type: 'audio', data: '' }));
  }
}

// --- Interrupt playback ---
function interruptPlayback(sessionId) {
  stopPlaybackVAD();
  // Stop current audio immediately
  if (currentAudio) {
    currentAudio.audio.pause();
    currentAudio.audio.onended = null;
    currentAudio.audio.onerror = null;
    URL.revokeObjectURL(currentAudio.url);
    currentAudio = null;
  }
  if (currentBufferedPlayer) {
    currentBufferedPlayer.stop();
    currentBufferedPlayer = null;
  }
  updateMicUI();

  // Send playback_done to unblock hub's converse() call
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ session_id: sessionId, type: 'playback_done' }));
  }
}

// --- Mic button ---
micBtn.addEventListener('click', () => {
  if (micBtn.disabled) return;

  // Interrupt: tap during playback → stop audio, hub sends listening next
  if (currentAudio || currentBufferedPlayer) {
    const sid = (currentAudio && currentAudio.sessionId) ||
                (currentBufferedPlayer && currentBufferedPlayer.sessionId) ||
                activeSessionId;
    interruptPlayback(sid);
    return;
  }

  // Send: tap during recording → stop and send audio
  if (recording) {
    stopRecording();
    return;
  }

  // Record: tap when idle → start recording
  if (pendingListenSessionId) {
    const sid = pendingListenSessionId;
    pendingListenSessionId = null;
    startRecording(sid);
  } else if (activeSessionId) {
    startRecording(activeSessionId);
  }
});

// --- Debug panel ---
let debugActive = false;
let debugTimer = null;

function showDebugPanel() {
  // Stop audio/recording when switching to debug
  if (activeSessionId) {
    stopActiveAudio();
    stopThinkingSound();
    if (recording) stopRecording(true);
    pendingListenSessionId = null;
  }
  activeSessionId = null;
  debugActive = true;

  // Update tab styling
  tabBar.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('debug-tab').classList.add('active');

  // Show debug, hide everything else
  document.getElementById('voice-grid').style.display = 'none';
  chatArea.style.display = 'none';
  controls.style.display = 'none';
  document.getElementById('debug-panel').style.display = 'flex';
  document.getElementById('debug-panel').style.flexDirection = 'column';

  refreshDebug();
  if (debugTimer) clearInterval(debugTimer);
  debugTimer = setInterval(refreshDebug, 5000);
}

function hideDebugPanel() {
  debugActive = false;
  document.getElementById('debug-panel').style.display = 'none';
  document.getElementById('debug-tab').classList.remove('active');
  if (debugTimer) { clearInterval(debugTimer); debugTimer = null; }
}

function debugDuration(seconds) {
  if (seconds < 60) return seconds + 's';
  if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + (seconds % 60) + 's';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  return h + 'h ' + m + 'm';
}

async function refreshDebug() {
  if (!debugActive) return;
  try {
    const resp = await fetch('/api/debug');
    if (!resp.ok) return;
    const data = await resp.json();

    // Hub info
    const hub = data.hub;
    document.getElementById('debug-hub').innerHTML = `
      <div class="debug-kv"><span class="k">Port</span><span class="v">${hub.port}</span></div>
      <div class="debug-kv"><span class="k">Uptime</span><span class="v">${debugDuration(hub.uptime_seconds)}</span></div>
      <div class="debug-kv"><span class="k">Browser</span><span class="v"><span class="debug-badge ${hub.browser_connected ? 'yes' : 'no'}">${hub.browser_connected ? 'connected' : 'disconnected'}</span></span></div>
      <div class="debug-kv"><span class="k">Sessions</span><span class="v">${hub.session_count}</span></div>
    `;

    // Services
    const stb = document.querySelector('#debug-services tbody');
    stb.innerHTML = '';
    for (const [name, svc] of Object.entries(data.services)) {
      const detail = svc.status === 'up' ? `HTTP ${svc.code}` : svc.error;
      stb.innerHTML += `<tr><td>${name}</td><td style="color:#666">${svc.url}</td><td><span class="debug-badge ${svc.status}">${svc.status}</span></td><td style="color:#555;font-size:0.7rem">${detail}</td></tr>`;
    }

    // Hub sessions
    const stb2 = document.querySelector('#debug-sessions tbody');
    stb2.innerHTML = '';
    document.getElementById('debug-no-sessions').style.display = data.sessions.length ? 'none' : 'block';
    for (const s of data.sessions) {
      const sc = s.status === 'ready' ? 'up' : s.status === 'starting' ? 'voice' : 'down';
      stb2.innerHTML += `<tr><td>${s.session_id}</td><td>${s.voice}</td><td><span class="debug-badge ${sc}">${s.status}</span></td><td><span class="debug-badge ${s.mcp_connected ? 'yes' : 'no'}">${s.mcp_connected ? 'yes' : 'no'}</span></td><td>${debugDuration(s.idle_seconds)}</td><td>${debugDuration(s.age_seconds)}</td><td style="color:#555">${s.work_dir}</td></tr>`;
    }

    // tmux sessions
    const stb3 = document.querySelector('#debug-tmux tbody');
    stb3.innerHTML = '';
    document.getElementById('debug-no-tmux').style.display = data.tmux_sessions.length ? 'none' : 'block';
    for (const t of data.tmux_sessions) {
      stb3.innerHTML += `<tr><td>${t.name}</td><td><span class="debug-badge ${t.is_voice ? 'voice' : 'other'}">${t.is_voice ? 'voice' : 'other'}</span></td><td>${t.windows}</td><td>${t.attached ? 'yes' : 'no'}</td><td>${new Date(t.created * 1000).toLocaleTimeString()}</td></tr>`;
    }

    document.getElementById('debug-refresh-info').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    console.warn('Debug refresh error:', e);
  }

  // Log tail
  try {
    const logResp = await fetch('/api/debug/log');
    if (logResp.ok) {
      const logData = await logResp.json();
      const el = document.getElementById('debug-log');
      el.textContent = logData.lines.join('\n') || '(empty)';
      el.scrollTop = el.scrollHeight;
    }
  } catch {}
}

// --- Init ---
connect();
</script>
