name: VoiceHub
options:
  bundleIdPrefix: com.zeul
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
targets:
  VoiceHub:
    type: application
    platform: iOS
    sources:
      - VoiceHub
      - VoiceHubShared
    dependencies:
      - target: VoiceHubWidgetExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zeul.voicehub
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 25QMAKVCBN
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: VoiceHub/Info.plist

  VoiceHubWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - VoiceHubWidget
      - VoiceHubShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zeul.voicehub.widget
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 25QMAKVCBN
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: VoiceHubWidget/Info.plist
