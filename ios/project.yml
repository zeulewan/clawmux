name: VoiceChat
options:
  bundleIdPrefix: com.zeul
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
targets:
  VoiceChat:
    type: application
    platform: iOS
    sources:
      - VoiceChat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zeul.voicechat
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 25QMAKVCBN
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Voice Chat needs microphone access for voice conversations"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
