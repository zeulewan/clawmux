name: ClawMux
options:
  bundleIdPrefix: com.zeul
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
targets:
  ClawMux:
    type: application
    platform: iOS
    sources:
      - ClawMux
      - ClawMuxShared
    dependencies:
      - target: ClawMuxWidgetExtension
    preBuildScripts:
      - name: Set Build Number from Git
        script: |
          BUILD=$(git -C "$SRCROOT" rev-list HEAD --count 2>/dev/null || echo "1")
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$INFOPLIST_FILE"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zeul.clawmux
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 25QMAKVCBN
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: ClawMux/Info.plist

  ClawMuxWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - ClawMuxWidget
      - ClawMuxShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zeul.clawmux.widget
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 25QMAKVCBN
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: ClawMuxWidget/Info.plist

  ClawMuxUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - ClawMuxUITests
    dependencies:
      - target: ClawMux
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zeul.clawmux.uitests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 25QMAKVCBN
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  ClawMux:
    build:
      targets:
        ClawMux: all
        ClawMuxUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClawMuxUITests
